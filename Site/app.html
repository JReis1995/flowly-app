    <script type="text/javascript">

                extend: {
                    colors: {
                        flowly: {

                            midnight: '#020617',  // Midnight
                            light: '#F8FAFC',     // Light Background
                            white: '#FFFFFF',     // White
                            slate: '#64748B',     // Slate
                            border: '#E2E8F0',    // Border
                            danger: '#EF4444',    // Alert Red
                            warning: '#FACC15'    // Warning Yellow

                    },
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    animation: {
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',

                    },
                    keyframes: {
                        slideInRight: {
                            '0%': { transform: 'translateX(100%)', opacity: '0' },
                            '100%': { transform: 'translateX(0)', opacity: '1' }
                        }
                    }
                }
            }
        }
    </script>

    <!-- Proteção contra falhas no carregamento de Fichas Técnicas -->
    <script>
        window.reportModuleError = window.reportModuleError || function(moduleName, error) {
            var msg = "Erro técnico no módulo [" + moduleName + "]: " + (error ? (error.message || error) : "Desconhecido");
            console.error(msg, error);
            if (typeof notify === 'function') notify(msg, "error"); else alert(msg);
        };
    </script>
