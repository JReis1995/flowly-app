<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap');

  /* CRÍTICO: Hidden by Default — evita FOUC em módulos sensíveis até applyClientConfig revelar */
  .auth-required {
    display: none !important;
  }

  body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background-color: var(--bg-app);
    color: var(--text-main);
    transition: background-color 0.3s, color 0.3s;
    overflow-x: hidden;
  }

  .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* UTILS */
  .glass-header {
    background: rgba(255, 255, 255, 0.90);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid #E2E8F0;
  }

  .animate-slide-up {
    animation: slideUp 0.6s forwards;
    opacity: 0;
    transform: translateY(20px);
  }

  @keyframes slideUp {
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .hidden {
    display: none !important;
  }

  /* CUSTOM SCROLLBAR */
  .custom-scrollbar::-webkit-scrollbar {
    width: 6px;
  }

  .custom-scrollbar::-webkit-scrollbar-track {
    background: #f1f5f9;
    border-radius: 3px;
  }

  .custom-scrollbar::-webkit-scrollbar-thumb {
    background: #94a3b8;
    border-radius: 3px;
  }

  .custom-scrollbar::-webkit-scrollbar-thumb:hover {
    background: #64748b;
  }

  /* TOAST STYLES */
  .toast-base {
    padding: 1rem;
    border-radius: 0.75rem;
    box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background-color: white;
    color: #1e293b;
    min-width: 300px;
    border-left-width: 4px;
    border-left-style: solid;
    animation: slideInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }

  .flowly-success {
    border-color: #10B981;
  }

  .flowly-danger {
    border-color: #EF4444;
  }

  /* CARDS & ANIMATIONS */
  .kpi-card {
    transition: transform 0.2s;
  }

  .kpi-card:active {
    transform: scale(0.98);
  }

  .scanner-pulse {
    animation: scannerPulse 2.5s infinite;
  }

  @keyframes scannerPulse {
    0% {
      box-shadow: 0 0 0 0 rgba(6, 182, 212, 0.6);
      transform: scale(1);
    }

    50% {
      box-shadow: 0 0 0 25px rgba(6, 182, 212, 0);
      transform: scale(1.05);
    }

    100% {
      box-shadow: 0 0 0 0 rgba(6, 182, 212, 0);
      transform: scale(1);
    }
  }

  @keyframes sparkle {

    0%,
    100% {
      opacity: 1;
    }

    50% {
      opacity: 0.85;
    }
  }

  .animate-sparkle {
    animation: sparkle 3s ease-in-out infinite;
  }

  label:has(#aiAutoToggle:checked) .pill-thumb {
    transform: translateX(1rem);
  }

  @keyframes typingPulse {

    0%,
    100% {
      opacity: 0.4;
    }

    50% {
      opacity: 1;
    }
  }

  .cfo-typing-dots {
    animation: typingPulse 1.2s ease-in-out infinite;
  }

  /* FORM FIXES */
  .input-error {
    border: 2px solid #EF4444 !important;
    background-color: #FEF2F2 !important;
  }

  #staffForm {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg-app);
    z-index: 5000;
    flex-direction: column;
  }

  .form-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 24px;
    padding-bottom: 100px;
  }

  /* SIDEBAR */
  .sidebar-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 2.25rem;
    height: 2.25rem;
    border-radius: 0.75rem;
    color: #64748B;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }

  .sidebar-btn:hover {
    background: #f1f5f9;
    color: #06B6D4;
  }

  .sidebar-btn.active {
    color: #06B6D4;
    background: #ecfeff;
  }

  .dash-period-btn.active {
    background: #020617;
    color: #ffffff;
    box-shadow: 0 4px 12px rgba(2, 6, 23, 0.3);
  }

  /* TEMAS */
  :root {
    --bg-app: #F8FAFC;
    --bg-card: #FFFFFF;
    --text-main: #020617;
    --text-muted: #64748B;
    --border: #E2E8F0;
    --flowly-primary: #06B6D4;
    --flowly-success: #10B981;
    --flowly-danger: #EF4444;
    --flowly-warning: #FACC15;
  }

  body[data-theme="claro"] {
    --bg-app: #F8FAFC;
    --bg-card: #FFFFFF;
    --text-main: #020617;
    --text-muted: #64748B;
    --border: #E2E8F0;
  }

  body[data-theme="escuro"] {
    --bg-app: #020617;
    --bg-card: #1E293B;
    --text-main: #F1F5F9;
    --text-muted: #94A3B8;
    --border: #334155;
  }

  body[data-theme="neutro"] {
    --bg-app: #F1F5F9;
    --bg-card: #E2E8F0;
    --text-main: #334155;
    --text-muted: #64748B;
    --border: #CBD5E1;
  }

  /* O bloco redundante de body foi removido e consolidado no topo */

  .theme-card {
    background-color: var(--bg-card) !important;
    color: var(--text-main) !important;
    border-color: var(--border) !important;
  }

  /* Dark mode: corrigir textos invisíveis */
  body[data-theme="escuro"] .view-section .text-flowly-midnight,
  body[data-theme="escuro"] .view-section .text-slate-900 {
    color: var(--text-main) !important;
  }

  /* CORREÇÃO IA: Textos invisíveis no Dashboard (Slate 800 e 700 para Branco) */
  body[data-theme="escuro"] .view-section .text-slate-800,
  body[data-theme="escuro"] .view-section .text-slate-700,
  body[data-theme="escuro"] .view-section .text-slate-600 {
    color: #F8FAFC !important;
  }

  /* CORREÇÃO IA: Forçar os Cartões de Gradiente da IA a ficarem Escuros */
  body[data-theme="escuro"] #stocksAiCard,
  body[data-theme="escuro"] #rhAiCard,
  body[data-theme="escuro"] #frotaAiCard,
  body[data-theme="escuro"] #financeiroAICard {
    background: #1E293B !important;
    /* Cor dark card */
    background-image: none !important;
    /* Remove gradientes brilhantes */
    border-color: #06B6D4 !important;
  }

  body[data-theme="escuro"] .view-section .text-slate-500,
  body[data-theme="escuro"] .view-section .text-slate-400 {
    color: var(--text-muted) !important;
  }

  body[data-theme="escuro"] .view-section .bg-white {
    background-color: var(--bg-card) !important;
    border-color: var(--border) !important;
  }

  body[data-theme="escuro"] .view-section .bg-slate-50 {
    background-color: #0F172A !important;
  }

  body[data-theme="escuro"] .view-section .bg-slate-100 {
    background-color: #1E293B !important;
  }

  body[data-theme="escuro"] .view-section .border-slate-50,
  body[data-theme="escuro"] .view-section .border-slate-100 {
    border-color: var(--border) !important;
  }

  body[data-theme="escuro"] .view-section select,
  body[data-theme="escuro"] .view-section input:not([type="checkbox"]):not([type="radio"]) {
    color: var(--text-main) !important;
    background-color: #0F172A !important;
    border-color: var(--border) !important;
  }

  body[data-theme="escuro"] .view-section select option {
    background-color: #1E293B;
    color: #F1F5F9;
  }

  /* Bug 3 Fix: inputs, selects e labels invisíveis no modo noturno (fora de .view-section) */
  body[data-theme="escuro"] input:not([type="checkbox"]):not([type="radio"]),
  body[data-theme="escuro"] select {
    color: #F8FAFC !important;
    background-color: #0F172A !important;
  }

  body[data-theme="escuro"] select option {
    color: #F8FAFC !important;
    background-color: #0F172A !important;
  }

  body[data-theme="escuro"] .text-slate-600 {
    color: #F8FAFC !important;
  }

  body[data-theme="escuro"] #aiChatMessages .bg-white {
    background-color: var(--bg-card) !important;
    color: var(--text-main) !important;
  }

  body[data-theme="escuro"] .glass-header {
    background: rgba(2, 6, 23, 0.90) !important;
    border-color: var(--border) !important;
  }

  body[data-theme="escuro"] .shadow-card,
  body[data-theme="escuro"] .view-section .shadow-sm,
  body[data-theme="escuro"] .view-section .shadow-xl {
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3) !important;
  }

  /* Acessibilidade: permitir seleção e colagem em campos de senha */
  #l_pass,
  #setupPassword,
  #setupPassword2,
  #r_pass,
  #r_pass2,
  #profilePassword {
    user-select: text !important;
    -webkit-user-select: text !important;
  }

  /* Tesouraria: checkboxes de seleção em massa — ativos e visíveis */
  .cc-selector {
    accent-color: #06B6D4 !important;
    cursor: pointer !important;
    opacity: 1 !important;
    filter: none !important;
  }

  /* Chart.js: fix scaling and overflow */
  .chart-wrapper {
    overflow: hidden;
    height: 250px;
  }

  .chart-wrapper canvas {
    max-height: 250px !important;
    width: 100% !important;
  }

  /* Mobile: evitar overlap no header */
  @media (max-width: 768px) {
    #headerLogo {
      display: none !important;
    }

    #appContent #appMain {
      padding-top: 0.5rem;
    }

    #viewDashboard .grid {
      padding-top: 0.25rem;
    }
  }

  /* ========================================
   CONDOMÍNIOS: TABS & MODAIS
   ======================================== */
  .condo-tab-btn {
    padding: 0.75rem 1.5rem;
    font-weight: 700;
    font-size: 0.875rem;
    color: #64748B;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .condo-tab-btn:hover {
    color: #06B6D4;
    background: #F0FDFF;
  }

  .condo-tab-btn.active {
    color: #06B6D4;
    border-bottom-color: #06B6D4;
    background: #F0FDFF;
  }

  .condo-tab-content {
    display: none;
    animation: fadeIn 0.3s ease-in-out;
  }

  .condo-tab-content.active {
    display: block;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }

    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .condo-eye-icon {
    cursor: pointer;
    transition: all 0.2s;
    color: #FACC15;
  }

  .condo-eye-icon:hover {
    color: #F59E0B;
    transform: scale(1.15);
  }

  .condo-vault-step {
    display: none;
  }

  .condo-vault-step.active {
    display: block;
    animation: fadeIn 0.3s ease-in-out;
  }

  /* High-contrast fixes for icons and modal close buttons */
  .fa-edit,
  .fa-trash-alt,
  .fa-times {
    color: currentColor !important;
    opacity: 1 !important;
  }

  [data-lucide="x"],
  .fa-times {
    background-color: #020617 !important;
    color: #FFFFFF !important;
    border-radius: 9999px !important;
    padding: 6px !important;
    display: inline-flex !important;
    align-items: center;
    justify-content: center;
  }

  /* MULTI-SELECT CUSTOM COMPONENT */
  .flowly-multi-select {
    position: relative;
    width: 100%;
    user-select: none;
  }

  .flowly-multi-select-trigger {
    background-color: #F8FAFC;
    border: 1px solid #E2E8F0;
    border-radius: 0.75rem;
    padding: 0.625rem 2.5rem 0.625rem 0.75rem;
    font-weight: 700;
    font-size: 0.875rem;
    color: #020617;
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 42px;
    display: flex;
    align-items: center;
    transition: all 0.2s;
  }

  .flowly-multi-select-trigger:after {
    content: "▼";
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 0.625rem;
    color: #64748B;
  }

  .flowly-multi-select.open .flowly-multi-select-dropdown {
    display: block;
  }

  .flowly-multi-select-dropdown {
    display: none;
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    width: 100%;
    max-height: 250px;
    overflow-y: auto;
    background-color: white;
    border: 1px solid #E2E8F0;
    border-radius: 0.75rem;
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    z-index: 100;
    padding: 0.5rem;
  }

  .flowly-multi-select-option {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.75rem;
    border-radius: 0.5rem;
    cursor: pointer;
    transition: background 0.15s;
    font-size: 0.875rem;
    font-weight: 600;
    color: #334155;
  }

  .flowly-multi-select-option:hover {
    background-color: #F1F5F9;
  }

  .flowly-multi-select-option input[type="checkbox"] {
    width: 1rem;
    height: 1rem;
    border-radius: 0.25rem;
    border: 1px solid #CBD5E1;
    cursor: pointer;
    accent-color: #06B6D4;
  }

  body[data-theme="escuro"] .flowly-multi-select-trigger {
    background-color: #0F172A;
    border-color: #334155;
    color: #F1F5F9;
  }

  body[data-theme="escuro"] .flowly-multi-select-dropdown {
    background-color: #1E293B;
    border-color: #334155;
  }

  body[data-theme="escuro"] .flowly-multi-select-option {
    color: #F1F5F9;
  }

  body[data-theme="escuro"] .flowly-multi-select-option:hover {
    background-color: #334155;
  }
</style>
