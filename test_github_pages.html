<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowly 360 - GitHub Pages Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Correção de Domínio: Forçar redirecionamento para evitar Frame Mismatch -->
    <script>
        (function() {
            var hostname = window.location.hostname;
            var pathname = window.location.pathname;
            var search = window.location.search;
            
            // Redirecionar www.flowly.pt para flowly.pt (ou vice-versa) para manter consistência
            if (hostname.startsWith('www.') && hostname.includes('flowly.pt')) {
                var newHost = hostname.replace('www.', '');
                if (hostname !== newHost) {
                    window.location.replace('https://' + newHost + pathname + search);
                }
            }
            // Também garantir HTTPS
            if (window.location.protocol === 'http:' && hostname.includes('flowly.pt')) {
                window.location.replace('https://' + hostname + pathname + search);
            }
        })();
    </script>
    
    <!-- Configuração Tailwind -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        flowly: {
                            primary: '#06B6D4',
                            success: '#10B981',
                            midnight: '#020617',
                            light: '#F8FAFC',
                            white: '#FFFFFF',
                            slate: '#64748B',
                            border: '#E2E8F0',
                            danger: '#EF4444',
                            warning: '#FACC15'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-flowly-light text-flowly-midnight">
    <!-- Incluir JS_Mock primeiro -->
    <div id="mock-container"></div>
    <script>
        // Carregar JS_Mock.html
        fetch('JS_Mock.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('mock-container').innerHTML = html;
            })
            .catch(err => console.error('Erro ao carregar JS_Mock:', err));
    </script>
    
    <div class="container mx-auto p-6">
        <h1 class="text-3xl font-bold text-flowly-primary mb-6">Flowly 360 - Teste GitHub Pages</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Card de Status -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4 text-flowly-midnight">Status do Mock</h2>
                <div id="mock-status" class="space-y-2">
                    <p class="text-sm text-gray-600">A verificar...</p>
                </div>
            </div>
            
            <!-- Card de Teste getMasterData -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4 text-flowly-midnight">Teste getMasterData</h2>
                <button onclick="testGetMasterData()" class="bg-flowly-primary text-white px-4 py-2 rounded hover:bg-opacity-90 transition">
                    Testar getMasterData
                </button>
                <div id="master-data-result" class="mt-4 text-sm"></div>
            </div>
            
            <!-- Card de Teste getAiCredits -->
            <div class="bg-white rounded-lg shadow-md p-6">
                <h2 class="text-xl font-semibold mb-4 text-flowly-midnight">Teste getAiCredits</h2>
                <button onclick="testGetAiCredits()" class="bg-flowly-success text-white px-4 py-2 rounded hover:bg-opacity-90 transition">
                    Testar getAiCredits
                </button>
                <div id="credits-result" class="mt-4 text-sm"></div>
            </div>
        </div>
        
        <!-- Console Log Display -->
        <div class="mt-8 bg-white rounded-lg shadow-md p-6">
            <h2 class="text-xl font-semibold mb-4 text-flowly-midnight">Console Logs</h2>
            <div id="console-output" class="bg-gray-100 rounded p-4 font-mono text-sm max-h-64 overflow-y-auto">
                <!-- Console logs aparecerão aqui -->
            </div>
        </div>
    </div>
    
    <script>
        // Capturar console logs
        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;
        
        function addToConsole(message, type = 'log') {
            const output = document.getElementById('console-output');
            const timestamp = new Date().toLocaleTimeString();
            const color = type === 'error' ? 'text-red-600' : type === 'warn' ? 'text-yellow-600' : 'text-gray-800';
            output.innerHTML += `<div class="${color}">[${timestamp}] ${message}</div>`;
            output.scrollTop = output.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'log');
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addToConsole(args.join(' '), 'warn');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };
        
        // Test functions
        function testGetMasterData() {
            const resultDiv = document.getElementById('master-data-result');
            resultDiv.innerHTML = '<p class="text-blue-600">A testar...</p>';
            
            if (window.google && window.google.script && window.google.script.run) {
                window.google.script.run
                    .withSuccessHandler(function(result) {
                        resultDiv.innerHTML = `
                            <div class="text-green-600 font-semibold">✓ Sucesso!</div>
                            <div class="mt-2">
                                <strong>planConfig:</strong> ${JSON.stringify(result.planConfig, null, 2)}
                            </div>
                            <div class="mt-2">
                                <strong>users:</strong> ${result.users.length} utilizador(es)
                            </div>
                            <div class="mt-2">
                                <strong>cc:</strong> ${result.cc.length} item(ns)
                            </div>
                        `;
                    })
                    .withFailureHandler(function(error) {
                        resultDiv.innerHTML = `<div class="text-red-600">✗ Erro: ${error}</div>`;
                    })
                    .getMasterData();
            } else {
                resultDiv.innerHTML = '<div class="text-red-600">✗ google.script.run não disponível</div>';
            }
        }
        
        function testGetAiCredits() {
            const resultDiv = document.getElementById('credits-result');
            resultDiv.innerHTML = '<p class="text-blue-600">A testar...</p>';
            
            if (window.google && window.google.script && window.google.script.run) {
                window.google.script.run
                    .withSuccessHandler(function(result) {
                        resultDiv.innerHTML = `
                            <div class="text-green-600 font-semibold">✓ Sucesso!</div>
                            <div class="mt-2">
                                <strong>Créditos IA:</strong> ${result}
                            </div>
                        `;
                    })
                    .withFailureHandler(function(error) {
                        resultDiv.innerHTML = `<div class="text-red-600">✗ Erro: ${error}</div>`;
                    })
                    .getAiCredits();
            } else {
                resultDiv.innerHTML = '<div class="text-red-600">✗ google.script.run não disponível</div>';
            }
        }
        
        // Verificar status do mock
        setTimeout(() => {
            const statusDiv = document.getElementById('mock-status');
            if (window.google && window.google.script && window.google.script.run) {
                statusDiv.innerHTML = `
                    <div class="text-green-600 font-semibold">✓ Mock ativo</div>
                    <div class="text-sm text-gray-600">google.script.run disponível</div>
                `;
            } else {
                statusDiv.innerHTML = `
                    <div class="text-red-600 font-semibold">✗ Mock inativo</div>
                    <div class="text-sm text-gray-600">google.script.run não disponível</div>
                `;
            }
        }, 1000);
        
        // Log inicial
        console.log('Flowly 360 - Teste GitHub Pages iniciado');
        console.log('Hostname:', window.location.hostname);
        console.log('Protocol:', window.location.protocol);
    </script>
</body>
</html>
