<script>
    // ========================================
    // MÓDULO CONDOMÍNIOS: LÓGICA
    // ========================================

    function switchCondominioTab(tabName) {
        const tabs = document.querySelectorAll('.condo-tab-btn');
        const contents = document.querySelectorAll('.condo-tab-content');

        tabs.forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tabName));
        contents.forEach(content => {
            const isActive = content.id === 'condoContent' + tabName.charAt(0).toUpperCase() + tabName.slice(1);
            content.classList.toggle('active', isActive);
            if (isActive) content.classList.remove('hidden');
            else content.classList.add('hidden');
        });

        if (tabName === 'predios') loadPredios();
        else if (tabName === 'fracoes') loadFracoes();
        else if (tabName === 'quotas') initQuotasTab();

        if (window.lucide) lucide.createIcons();
    }

    // ========================================
    // 💰 GESTÃO DE QUOTAS — LÓGICA FRONTEND
    // ========================================

    let _quotasPrediosList = [];

    // --- COMPONENTE MULTI-SELECT ---
    function renderMultiSelect(containerId, options, placeholder) {
        const container = document.getElementById(containerId);
        if (!container) return;
        container.innerHTML = `
            <div class="flowly-multi-select-trigger" onclick="toggleMultiSelect(this)">${placeholder}</div>
            <div class="flowly-multi-select-dropdown custom-scrollbar">
                ${options.map(opt => `
                    <div class="flowly-multi-select-option" onclick="toggleMultiSelectOption(this, event)">
                        <input type="checkbox" value="${opt.value}" ${opt.selected ? 'checked' : ''} onchange="updateMultiSelectTrigger(this)">
                        <span>${opt.label}</span>
                    </div>
                `).join('')}
            </div>
        `;
        const firstInp = container.querySelector('input[type="checkbox"]');
        if (firstInp) updateMultiSelectTrigger(firstInp, true);
    }

    window.toggleMultiSelect = function(trigger) {
        const ms = trigger.parentElement;
        const isOpen = ms.classList.contains('open');
        document.querySelectorAll('.flowly-multi-select.open').forEach(el => el.classList.remove('open'));
        if (!isOpen) ms.classList.add('open');
    };

    window.toggleMultiSelectOption = function(optionEl, event) {
        if (event.target.tagName === 'INPUT') return;
        const cb = optionEl.querySelector('input[type="checkbox"]');
        cb.checked = !cb.checked;
        updateMultiSelectTrigger(cb);
    };

    window.updateMultiSelectTrigger = function(checkbox, isInitial = false) {
        if (!checkbox) return;
        const ms = checkbox.closest('.flowly-multi-select');
        if (!ms) return;
        const trigger = ms.querySelector('.flowly-multi-select-trigger');
        const checked = Array.from(ms.querySelectorAll('input[type="checkbox"]:checked'));
        const total = ms.querySelectorAll('input[type="checkbox"]').length;
        
        if (checked.length === 0) trigger.textContent = 'Nenhum selecionado';
        else if (checked.length === 1) trigger.textContent = checked[0].nextElementSibling.textContent;
        else if (checked.length === total) trigger.textContent = 'Todos selecionados';
        else trigger.textContent = checked.length + ' selecionados';

        // Lógica de especialização (evitar overwrites)
        if (!isInitial) {
            if (ms.id && ms.id.startsWith('quotasFiltro')) {
                 if (window._msTimeout) clearTimeout(window._msTimeout);
                 window._msTimeout = setTimeout(() => loadQuotas(), 500);
            } else if (ms.id === 'extraQuotaPredioContainer') {
                if (typeof updateFracoesForExtraQuota === 'function') updateFracoesForExtraQuota();
            } else if (ms.id === 'notifPredioContainer') {
                if (typeof loadDevedoresParaNotif === 'function') loadDevedoresParaNotif();
            }
        }
    };

    document.addEventListener('click', (e) => {
        if (!e.target.closest('.flowly-multi-select')) {
            document.querySelectorAll('.flowly-multi-select.open').forEach(el => el.classList.remove('open'));
        }
    });

    function getMultiValues(id) {
        const container = document.getElementById(id);
        if (!container) return [];
        return Array.from(container.querySelectorAll('input:checked')).map(cb => cb.value);
    }

    function initQuotasTab() {
        const hoje = new Date();
        
        // Iniciar Dias (1-31)
        const dias = [];
        for (let d = 1; d <= 31; d++) dias.push({ value: d, label: d, selected: false });
        renderMultiSelect('quotasFiltroDiaContainer', dias, 'Todos os Dias');

        // Iniciar Meses
        const mesesNomes = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
        const meses = mesesNomes.map((n, i) => ({ value: i + 1, label: n, selected: (i + 1 === hoje.getMonth() + 1) }));
        renderMultiSelect('quotasFiltroMesContainer', meses, 'Este Mês');

        // Iniciar Anos
        const anos = [];
        for (let a = hoje.getFullYear() + 2; a >= 2023; a--) {
            anos.push({ value: a, label: a, selected: (a === hoje.getFullYear()) });
        }
        renderMultiSelect('quotasFiltroAnoContainer', anos, 'Este Ano');

        // Carregar lista de prédios nos selectors
        google.script.run.withSuccessHandler(predios => {
            _quotasPrediosList = predios || [];
            
            // Filtro Principal
            const optPredios = _quotasPrediosList.map(p => ({ value: p.id, label: p.nome, selected: false }));
            renderMultiSelect('quotasFiltroPrediContainer', optPredios, 'Todos os Prédios');
            
            // Modais (inicialmente vazios ou todos desmarcados)
            renderMultiSelect('gerarQuotasPredioContainer', optPredios, 'Selecionar Prédios...');
            renderMultiSelect('extraQuotaPredioContainer', optPredios, 'Selecionar Prédios...');
            renderMultiSelect('notifPredioContainer', optPredios, 'Selecionar Prédios...');

            loadQuotas();
        }).getBuildings(_ctxEmail());
    }

    function loadQuotas() {
        const idsPredio = getMultiValues('quotasFiltroPrediContainer');
        const dias = getMultiValues('quotasFiltroDiaContainer');
        const meses = getMultiValues('quotasFiltroMesContainer');
        const anos = getMultiValues('quotasFiltroAnoContainer');
        const status = document.getElementById('quotasFiltroStatus')?.value || '';
        
        const tbody = document.getElementById('tableQuotasBody');
        if (!tbody) return;
        tbody.innerHTML = '<tr><td colspan="9" class="px-4 py-8 text-center text-[#64748B]"><i class="inline animate-spin mr-2">⏳</i>A carregar quotas...</td></tr>';

        const filtros = {
            dias: dias.length ? dias : null,
            meses: meses.length ? meses : null,
            anos: anos.length ? anos : null,
            status: status || null
        };

        google.script.run.withSuccessHandler(res => {
            if (!res || !res.success) {
                tbody.innerHTML = `<tr><td colspan="9" class="px-4 py-8 text-center text-red-500 text-sm">${res?.error || 'Erro'}</td></tr>`;
                return;
            }
            const { quotas, totais } = res;
            // KPIs
            if (document.getElementById('kpiQuotasPagas')) {
                document.getElementById('kpiQuotasPagas').textContent = totais.pago;
                document.getElementById('kpiValorPago').textContent = '€' + totais.totalPago.toFixed(2);
                document.getElementById('kpiQuotasPendentes').textContent = totais.pendente;
                document.getElementById('kpiValorPendente').textContent = '€' + totais.totalPendente.toFixed(2);
                document.getElementById('kpiQuotasAtraso').textContent = totais.emAtraso || 0;
                document.getElementById('kpiValorAtraso').textContent = '€' + (totais.valorAtraso || 0).toFixed(2);
                document.getElementById('kpiTotalCobrado').textContent = (totais.pago + totais.pendente);
            }
            if (!quotas || quotas.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9" class="px-4 py-8 text-center text-[#64748B]">Nenhuma quota encontrada para os filtros selecionados.</td></tr>';
                return;
            }
            const mesesNomes = ['', 'Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
            tbody.innerHTML = quotas.map(q => {
                let statusBadge = '';
                if (q.status === 'Pago') statusBadge = '<span class="bg-emerald-100 text-emerald-700 px-2 py-0.5 rounded-full text-[10px] font-black">✔ Pago</span>';
                else if (q.emAtraso) statusBadge = '<span class="bg-red-100 text-red-700 px-2 py-0.5 rounded-full text-[10px] font-black animate-pulse">🔴 Atraso</span>';
                else if (q.status === 'Pendente') statusBadge = '<span class="bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full text-[10px] font-black">⏳ Pendente</span>';
                else statusBadge = '<span class="bg-slate-100 text-slate-500 px-2 py-0.5 rounded-full text-[10px] font-black">' + q.status + '</span>';

                const rowBg = q.emAtraso ? 'bg-red-50' : '';
                const acoes = q.status === 'Pendente' ? `
                    <button onclick="openModalPagarQuota('${q.idQuota}','${(q.designacao || '').replace(/'/g, "\\'")}','${q.valor}')" 
                        class="text-emerald-600 hover:text-emerald-700 mr-2" title="Marcar como Pago">
                        <i data-lucide="check-circle" class="w-4 h-4"></i></button>
                    <button onclick="cancelarQuotaFrontend('${q.idQuota}')" 
                        class="text-slate-400 hover:text-red-500" title="Cancelar Quota">
                        <i data-lucide="x-circle" class="w-4 h-4"></i></button>` : '';
                return `<tr class="border-b border-flowly-border ${rowBg}">
                    <td class="px-3 py-2.5 text-[11px] font-mono text-[#64748B]">${q.idQuota}</td>
                    <td class="px-3 py-2.5 text-sm font-bold">${q.designacao || ''}</td>
                    <td class="px-3 py-2.5 text-sm text-[#64748B]">${q.proprietario || ''}</td>
                    <td class="px-3 py-2.5 text-xs text-[#64748B]">${q.tipo || ''}</td>
                    <td class="px-3 py-2.5 text-sm font-bold">${mesesNomes[parseInt(q.mes)] || ''} ${q.ano}</td>
                    <td class="px-3 py-2.5 text-sm font-black text-right">${parseFloat(q.valor || 0).toFixed(2)}€</td>
                    <td class="px-3 py-2.5 text-sm text-[#64748B]">${q.dataVencimento || ''}</td>
                    <td class="px-3 py-2.5">${statusBadge}</td>
                    <td class="px-3 py-2.5 flex items-center gap-1">${acoes}</td>
                </tr>`;
            }).join('');
            if (window.lucide) lucide.createIcons();
        }).withFailureHandler(err => {
            tbody.innerHTML = `<tr><td colspan="9" class="px-4 py-8 text-center text-red-500 text-sm">${err}</td></tr>`;
        }).getQuotasCC(idsPredio.length ? idsPredio : null, filtros, _ctxEmail());
    }

    // ================================================
    // MODAL: GERAR QUOTAS MENSAIS
    // ================================================
    function openModalGerarQuotas() {
        const hoje = new Date();
        document.getElementById('gerarQuotasMes').value = hoje.getMonth() + 1;
        document.getElementById('gerarQuotasAno').value = hoje.getFullYear();
        
        const optPredios = _quotasPrediosList.map(p => ({ value: p.id, label: p.nome, selected: false }));
        renderMultiSelect('gerarQuotasPredioContainer', optPredios, 'Selecionar Prédios...');
        
        document.getElementById('modalGerarQuotas').classList.remove('hidden');
        if (window.lucide) lucide.createIcons();
    }

    function confirmarGerarQuotas() {
        const idsPredio = getMultiValues('gerarQuotasPredioContainer');
        const mes = document.getElementById('gerarQuotasMes').value;
        const ano = document.getElementById('gerarQuotasAno').value;
        if (!idsPredio.length) return typeof notify === 'function' && notify('Selecione pelo menos um prédio.', 'warning');
        if (!mes || !ano) return typeof notify === 'function' && notify('Selecione mês e ano.', 'warning');
        
        const btn = document.getElementById('btnConfirmarGerarQuotas');
        btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin mr-2"></i> A gerar...';
        if (window.lucide) lucide.createIcons();
        google.script.run.withSuccessHandler(res => {
            btn.disabled = false; btn.innerHTML = '<i data-lucide="zap" class="w-4 h-4"></i> Gerar Quotas';
            if (res.success) {
                if (typeof notify === 'function') notify(res.message, 'success');
                document.getElementById('modalGerarQuotas').classList.add('hidden');
                loadQuotas();
            } else { if (typeof notify === 'function') notify(res.error, 'error'); }
        }).withFailureHandler(err => {
            btn.disabled = false; btn.innerHTML = '<i data-lucide="zap" class="w-4 h-4"></i> Gerar Quotas';
            if (typeof notify === 'function') notify(err, 'error');
        }).gerarQuotasMensais(idsPredio, mes, ano, _ctxEmail());
    }

    // ================================================
    // MODAL: QUOTA EXTRA
    // ================================================
    function openModalQuotaExtra() {
        const optPredios = _quotasPrediosList.map(p => ({ value: p.id, label: p.nome, selected: false }));
        renderMultiSelect('extraQuotaPredioContainer', optPredios, 'Selecionar Prédios...');
        
        const selF = document.getElementById('extraQuotaFracaoId');
        selF.innerHTML = '<option value="">Todas as Frações Ativas</option>';
        document.getElementById('extraQuotaDescricao').value = '';
        document.getElementById('extraQuotaValor').value = '';
        document.getElementById('extraQuotaVencimento').value = '';
        document.getElementById('modalQuotaExtra').classList.remove('hidden');
        if (window.lucide) lucide.createIcons();
    }

    // Atualizar frações quando prédio muda no modal Extra
    // Como agora é multi-select, se selecionar mais de um prédio, desativamos seleção de fração específica
    function updateFracoesForExtraQuota() {
        const ids = getMultiValues('extraQuotaPredioContainer');
        const selF = document.getElementById('extraQuotaFracaoId');
        if (ids.length !== 1) {
            selF.innerHTML = '<option value="">Todas as Frações Ativas (Multi-Prédio)</option>';
            selF.disabled = true;
            return;
        }
        selF.disabled = false;
        selF.innerHTML = '<option value="">A carregar...</option>';
        google.script.run.withSuccessHandler(res => {
            if (!res || !res.success) { selF.innerHTML = '<option value="">Todas as Frações Ativas</option>'; return; }
            selF.innerHTML = '<option value="">Todas as Frações Ativas</option>' + 
                res.units.map(u => `<option value="${u.ID_Fracao}">${u.Designacao} — ${u.Proprietario || ''}</option>`).join('');
        }).getUnitsSafe(ids[0], _ctxEmail());
    }

    // Hooks removidos (integrados na função principal para estabilidade)

    function confirmarQuotaExtra() {
        const idsPredio = getMultiValues('extraQuotaPredioContainer');
        const idFracao = document.getElementById('extraQuotaFracaoId').value;
        const descricao = document.getElementById('extraQuotaDescricao').value;
        const valor = document.getElementById('extraQuotaValor').value;
        const vencimento = document.getElementById('extraQuotaVencimento').value;
        
        if (!idsPredio.length) return typeof notify === 'function' && notify('Selecione pelo menos um prédio.', 'warning');
        if (!descricao || !valor) return typeof notify === 'function' && notify('Preencha descrição e valor.', 'warning');
        
        const btn = document.getElementById('btnConfirmarQuotaExtra');
        btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin mr-2"></i> A criar...';
        google.script.run.withSuccessHandler(res => {
            btn.disabled = false; btn.innerHTML = '<i data-lucide="plus-circle" class="w-4 h-4"></i> Criar Quota Extra';
            if (res.success) {
                if (typeof notify === 'function') notify(res.message, 'success');
                document.getElementById('modalQuotaExtra').classList.add('hidden');
                loadQuotas();
            } else { if (typeof notify === 'function') notify(res.error, 'error'); }
        }).adicionarQuotaExtra(idsPredio, (idsPredio.length === 1 ? idFracao : null), descricao, valor, vencimento || null, _ctxEmail());
    }

    // ================================================
    // MODAL: PAGAR QUOTA
    // ================================================
    function openModalPagarQuota(idQuota, designacao, valor) {
        document.getElementById('pagarQuotaId').value = idQuota;
        document.getElementById('pagarQuotaInfo').textContent = designacao + ' — €' + parseFloat(valor).toFixed(2);
        document.getElementById('pagarQuotaMetodo').value = 'Transferência';
        document.getElementById('pagarQuotaNotas').value = '';
        document.getElementById('modalPagarQuota').classList.remove('hidden');
        if (window.lucide) lucide.createIcons();
    }

    function confirmarPagamentoQuota() {
        const idQuota = document.getElementById('pagarQuotaId').value;
        const metodo = document.getElementById('pagarQuotaMetodo').value;
        const notas = document.getElementById('pagarQuotaNotas').value;
        if (!idQuota) return;
        const btn = document.getElementById('btnConfirmarPagamento');
        btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin mr-2"></i> A registar...';
        if (window.lucide) lucide.createIcons();
        google.script.run.withSuccessHandler(res => {
            btn.disabled = false; btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> Confirmar';
            if (res.success) {
                if (typeof notify === 'function') notify('✅ Pagamento registado com sucesso!', 'success');
                document.getElementById('modalPagarQuota').classList.add('hidden');
                loadQuotas();
            } else { if (typeof notify === 'function') notify(res.error, 'error'); }
        }).withFailureHandler(err => {
            btn.disabled = false; btn.innerHTML = '<i data-lucide="check" class="w-4 h-4"></i> Confirmar';
            if (typeof notify === 'function') notify(err, 'error');
        }).pagarQuota(idQuota, metodo, notas, _ctxEmail());
    }

    function cancelarQuotaFrontend(idQuota) {
        if (!confirm('Cancelar esta quota? Esta ação regista-se na auditoria.')) return;
        google.script.run.withSuccessHandler(res => {
            if (res.success) {
                if (typeof notify === 'function') notify('Quota cancelada.', 'success');
                loadQuotas();
            } else { if (typeof notify === 'function') notify(res.error, 'error'); }
        }).cancelarQuota(idQuota, 'Cancelado pelo gestor via UI', _ctxEmail());
    }

    // ================================================
    // MODAL: NOTIFICAÇÕES
    // ================================================
    function openModalNotificacoes() {
        const optPredios = _quotasPrediosList.map(p => ({ value: p.id, label: p.nome, selected: false }));
        renderMultiSelect('notifPredioContainer', optPredios, 'Selecionar Prédios...');
        
        document.getElementById('notifMensagem').value = '';
        document.getElementById('notifEmailGestor').value = currentUser ? currentUser.email : '';
        document.getElementById('listaDevedoresNotif').innerHTML = '<span class="text-slate-400 italic">Selecione prédios para ver devedores.</span>';
        document.getElementById('modalNotificacoes').classList.remove('hidden');
        if (window.lucide) lucide.createIcons();
    }

    function loadDevedoresParaNotif() {
        const ids = getMultiValues('notifPredioContainer');
        const el = document.getElementById('listaDevedoresNotif');
        if (!ids.length) { el.innerHTML = '<span class="text-slate-400 italic">Selecione prédios para ver devedores.</span>'; return; }
        el.innerHTML = '<span class="text-slate-400 italic">A carregar...</span>';
        google.script.run.withSuccessHandler(res => {
            if (!res || !res.success) { el.innerHTML = '<span class="text-red-500">Erro ao carregar.</span>'; return; }
            if (!res.devedores || res.devedores.length === 0) {
                el.innerHTML = '<div class="bg-emerald-50 border border-emerald-200 rounded-xl p-3 text-xs text-emerald-700 font-bold">✅ Nenhum devedor em atraso nestes prédios!</div>';
                return;
            }
            el.innerHTML = `<div class="space-y-2">${res.devedores.map(d => `
                <div class="flex items-center justify-between bg-white border border-red-100 rounded-xl p-2.5">
                    <div>
                        <p class="text-xs font-black text-slate-800">${d.designacao} — ${d.proprietario}</p>
                        <p class="text-[10px] text-slate-500">${d.predioNome || ''} | ${d.email || 'sem email'} | ${d.quotasAtraso} quota(s)</p>
                    </div>
                    <span class="text-sm font-black text-flowly-danger">€${d.totalDivida.toFixed(2)}</span>
                </div>`).join('')}
                <p class="text-[10px] text-slate-500 text-right font-bold">Total: €${res.totalGlobalDivida.toFixed(2)}</p>
            </div>`;
        }).getDevedoresCondominios(ids, _ctxEmail());
    }

    function enviarEmailDevedores() {
        const ids = getMultiValues('notifPredioContainer');
        const mensagem = document.getElementById('notifMensagem').value;
        if (!ids.length) return typeof notify === 'function' && notify('Selecione pelo menos um prédio.', 'warning');
        if (!confirm('Enviar email a TODOS os devedores com quotas em atraso nos prédios selecionados?')) return;
        
        const btn = document.getElementById('btnEnviarEmailDevedores');
        btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin mr-2"></i> A enviar...';
        if (window.lucide) lucide.createIcons();
        google.script.run.withSuccessHandler(res => {
            btn.disabled = false; btn.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i> Enviar Email a Todos os Devedores';
            if (typeof notify === 'function') notify(res.success ? res.message : res.error, res.success ? 'success' : 'error');
        }).withFailureHandler(err => {
            btn.disabled = false; btn.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i> Enviar Email a Todos os Devedores';
            if (typeof notify === 'function') notify(err, 'error');
        }).enviarNotificacaoEmail(ids, null, mensagem || null, _ctxEmail());
    }

    function enviarSumarioGestor() {
        const ids = getMultiValues('notifPredioContainer');
        const emailGestor = document.getElementById('notifEmailGestor').value;
        if (!ids.length) return typeof notify === 'function' && notify('Selecione pelo menos um prédio.', 'warning');
        if (!emailGestor || !emailGestor.includes('@')) return typeof notify === 'function' && notify('Email do gestor inválido.', 'warning');
        
        const btn = document.getElementById('btnEnviarSumario');
        btn.disabled = true; btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin mr-2"></i> A enviar...';
        if (window.lucide) lucide.createIcons();
        google.script.run.withSuccessHandler(res => {
            btn.disabled = false; btn.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i> Enviar Sumário Semanal';
            if (typeof notify === 'function') notify(res.success ? res.message : res.error, res.success ? 'success' : 'error');
        }).withFailureHandler(err => {
            btn.disabled = false; btn.innerHTML = '<i data-lucide="send" class="w-4 h-4"></i> Enviar Sumário Semanal';
            if (typeof notify === 'function') notify(err, 'error');
        }).enviarSumarioSemanal(ids, emailGestor, _ctxEmail());
    }

    // ========================================
    // CONDOMÍNIOS: PRÉDIOS E FRAÇÕES
    // ========================================

    function loadPredios() {
        const tbody = document.getElementById('tablePrediosBody');
        if (!tbody) return;
        tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-[#64748B]">A carregar...</td></tr>';
        google.script.run.withSuccessHandler(function (predios) {
            if (!predios || predios.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="px-4 py-8 text-center text-[#64748B]">Nenhum prédio registado.</td></tr>';
                return;
            }
            tbody.innerHTML = predios.map(p => `
            <tr class="border-b border-flowly-border">
                <td class="px-4 py-3 text-sm font-bold">${p.nome || ''}</td>
                <td class="px-4 py-3 text-sm text-[#64748B]">${p.morada || ''}</td>
                <td class="px-4 py-3 text-sm text-[#64748B]">${p.nif || ''}</td>
                <td class="px-4 py-3 text-sm">${p.iban ? `<span class="blur-sm select-none">${p.iban.substring(0, 8)}...</span> <i data-lucide="eye" class="condo-eye-icon w-4 h-4 inline-block ml-2" onclick="requestRevealSensitive('${p.id}', 'predio', 'iban')"></i>` : '-'}</td>
                <td class="px-4 py-3">
                    <button onclick="openIbanVault('${p.id}')" title="Cofre IBAN (2FA)" class="text-amber-500 hover:text-flowly-warning mr-3"><i data-lucide="shield-alert" class="w-4 h-4"></i></button>
                    <button onclick="editPredio('${p.id}')" class="text-[#06B6D4] hover:text-cyan-600 mr-3"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                    <button onclick="deletePredio('${p.id}', '${(p.nome || '').replace(/'/g, "\\'")}')"><i data-lucide="trash-2" class="w-4 h-4 text-rose-500"></i></button>
                </td>
            </tr>`).join('');
            if (window.lucide) lucide.createIcons();
        }).getBuildings(_ctxEmail());
    }

    function openModalPredioForm() {
        document.getElementById('predioFormId').value = '';
        document.getElementById('predioFormNome').value = '';
        document.getElementById('predioFormMorada').value = '';
        document.getElementById('predioFormPorta').value = '';
        document.getElementById('predioFormSuplemento').value = '';
        document.getElementById('predioFormNif').value = '';
        document.getElementById('predioFormIban').value = '';
        document.getElementById('predioFormIban').disabled = true;
        document.getElementById('predioFormIban').placeholder = 'Use o Cofre IBAN para alterar';
        document.getElementById('predioFormElevador').checked = false;
        document.getElementById('predioFormDataManutencao').value = '';
        document.getElementById('modalPredioTitle').innerText = 'Novo Prédio';
        document.getElementById('modalPredioForm').classList.remove('hidden');
    }

    function editPredio(id) {
        if (typeof notify === 'function') notify('A carregar prédio...', 'info');
        google.script.run.withSuccessHandler(p => {
            if (!p) return typeof notify === 'function' && notify('Erro ao carregar prédio', 'error');
            document.getElementById('predioFormId').value = p.id;
            document.getElementById('predioFormNome').value = p.nome;
            var pdParts = p.morada ? p.morada.split(" | ") : ["", "", ""];
            document.getElementById('predioFormMorada').value = pdParts[0] || '';
            document.getElementById('predioFormPorta').value = pdParts[1] || '';
            document.getElementById('predioFormSuplemento').value = pdParts[2] || '';
            document.getElementById('predioFormNif').value = p.nif;
            document.getElementById('predioFormIban').value = p.iban;
            document.getElementById('predioFormIban').disabled = true;
            document.getElementById('predioFormIban').placeholder = 'Use o Cofre IBAN para alterar';
            document.getElementById('predioFormElevador').checked = !!p.temElevador;
            document.getElementById('predioFormDataManutencao').value = p.manutencaoData ? new Date(p.manutencaoData).toISOString().split('T')[0] : '';
            document.getElementById('modalPredioTitle').innerText = 'Editar Prédio';
            document.getElementById('modalPredioForm').classList.remove('hidden');
        }).getBuildingById(id, _ctxEmail());
    }

    function submitPredioForm() {
        const id = document.getElementById('predioFormId').value;
        const rua = document.getElementById('predioFormMorada').value;
        const porta = document.getElementById('predioFormPorta').value;
        const supl = document.getElementById('predioFormSuplemento').value;
        const moradaCompleta = [rua, porta, supl].filter(Boolean).join(" | ");

        const payload = {
            nomePredio: document.getElementById('predioFormNome').value,
            morada: moradaCompleta,
            nifCondominio: document.getElementById('predioFormNif').value,
            adminEmail: currentUser ? currentUser.email : '',
            temElevador: document.getElementById('predioFormElevador').checked,
            manutencaoData: document.getElementById('predioFormDataManutencao').value
        };

        const btn = document.getElementById('btnSubmitPredio');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin mr-2"></i> A guardar...';
        if (window.lucide) lucide.createIcons();

        google.script.run.withSuccessHandler(res => {
            btn.disabled = false;
            btn.innerHTML = originalText;
            if (res.success) {
                if (typeof notify === 'function') notify("Prédio salvo com sucesso", "success");
                document.getElementById('modalPredioForm').classList.add('hidden');
                loadPredios();
            } else {
                if (typeof notify === 'function') notify(res.error, "error");
            }
        }).withFailureHandler(err => {
            btn.disabled = false;
            btn.innerHTML = originalText;
            if (typeof notify === 'function') notify(err, "error");
        })
        [id ? "updateBuilding" : "createBuilding"](id ? id : payload, id ? payload : _ctxEmail(), id ? _ctxEmail() : undefined);
    }

    function deletePredio(id, nome) {
        if (!confirm(`Tem a certeza que deseja eliminar o prédio ${nome}?`)) return;
        google.script.run.withSuccessHandler(res => {
            if (res.success) {
                if (typeof notify === 'function') notify("Prédio eliminado", "success");
                loadPredios();
            } else {
                if (typeof notify === 'function') notify(res.error, "error");
            }
        }).deleteBuilding(id, _ctxEmail());
    }

    function loadFracoes() {
        const tbody = document.getElementById('tableFracoesBody');
        if (!tbody) return;
        tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-[#64748B]">A carregar...</td></tr>';
        google.script.run.withSuccessHandler(function (fracoes) {
            if (!fracoes || fracoes.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-8 text-center text-[#64748B]">Nenhuma fração registada.</td></tr>';
                return;
            }
            tbody.innerHTML = fracoes.map(f => `
            <tr class="border-b border-flowly-border">
                <td class="px-4 py-3 text-sm text-[#64748B]">${f.predioId || ''}</td>
                <td class="px-4 py-3 text-sm font-bold">${f.identificador || ''}</td>
                <td class="px-4 py-3 text-sm text-[#64748B]">${f.proprietario || ''}</td>
                <td class="px-4 py-3 text-sm text-[#64748B]">${f.email || ''}</td>
                <td class="px-4 py-3 text-sm text-[#64748B]">${f.permilagem || '0'}‰</td>
                <td class="px-4 py-3 text-sm font-black text-emerald-600">${f.quota || '0'}€</td>
                <td class="px-4 py-3">
                    <button onclick="editFracao('${f.id}')" class="text-[#06B6D4] hover:text-cyan-600 mr-3"><i data-lucide="edit-2" class="w-4 h-4"></i></button>
                    <button onclick="deleteFracao('${f.id}', '${(f.identificador || '').replace(/'/g, "\\'")}')"><i data-lucide="trash-2" class="w-4 h-4 text-rose-500"></i></button>
                </td>
            </tr>`).join('');
            if (window.lucide) lucide.createIcons();
        }).getFracoes(_ctxEmail());
    }

    function openModalFracaoForm() {
        document.getElementById('fracaoFormId').value = '';
        document.getElementById('fracaoFormIdentificacao').value = '';
        document.getElementById('fracaoFormProprietario').value = '';
        document.getElementById('fracaoFormEmail').value = '';
        document.getElementById('fracaoFormTelefone').value = '';
        document.getElementById('fracaoFormQuota').value = '';
        document.getElementById('fracaoFormPermilagem').value = '';
        document.getElementById('modalFracaoTitle').innerText = 'Nova Fração';

        google.script.run.withSuccessHandler(predios => {
            const sel = document.getElementById('fracaoFormPredioId');
            sel.innerHTML = '<option value="">Selecione...</option>' + predios.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
            document.getElementById('modalFracaoForm').classList.remove('hidden');
        }).getBuildings(_ctxEmail());
    }

    function editFracao(id) {
        if (typeof notify === 'function') notify('A carregar fração...', 'info');
        google.script.run.withSuccessHandler(f => {
            if (!f) return typeof notify === 'function' && notify('Erro ao carregar fração', 'error');
            google.script.run.withSuccessHandler(predios => {
                const sel = document.getElementById('fracaoFormPredioId');
                sel.innerHTML = '<option value="">Selecione...</option>' + predios.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');

                document.getElementById('fracaoFormId').value = f.id;
                document.getElementById('fracaoFormPredioId').value = f.predioId;
                document.getElementById('fracaoFormIdentificacao').value = f.identificador;
                document.getElementById('fracaoFormProprietario').value = f.proprietario;
                document.getElementById('fracaoFormEmail').value = f.email || '';
                document.getElementById('fracaoFormTelefone').value = f.telefone || '';
                document.getElementById('fracaoFormQuota').value = f.quota || '';
                document.getElementById('fracaoFormPermilagem').value = f.permilagem;
                document.getElementById('modalFracaoTitle').innerText = 'Editar Fração';

                document.getElementById('modalFracaoForm').classList.remove('hidden');
            }).getBuildings(_ctxEmail());
        }).getFracaoById(id, _ctxEmail());
    }

    function submitFracaoForm() {
        const id = document.getElementById('fracaoFormId').value;
        const payload = {
            predioId: document.getElementById('fracaoFormPredioId').value,
            identificador: document.getElementById('fracaoFormIdentificacao').value,
            proprietario: document.getElementById('fracaoFormProprietario').value,
            emailProprietario: document.getElementById('fracaoFormEmail').value,
            telefone: document.getElementById('fracaoFormTelefone').value,
            quota: document.getElementById('fracaoFormQuota').value,
            permilagem: document.getElementById('fracaoFormPermilagem').value
        };

        const btn = document.getElementById('btnSubmitFracao');
        const originalText = btn.innerHTML;
        btn.disabled = true;
        btn.innerHTML = '<i data-lucide="loader-2" class="w-4 h-4 animate-spin mr-2"></i> A guardar...';
        if (window.lucide) lucide.createIcons();

        google.script.run.withSuccessHandler(res => {
            btn.disabled = false;
            btn.innerHTML = originalText;
            if (res.success) {
                if (typeof notify === 'function') notify("Fração salva com sucesso", "success");
                document.getElementById('modalFracaoForm').classList.add('hidden');
                loadFracoes();
            } else {
                if (typeof notify === 'function') notify(res.error, "error");
            }
        }).withFailureHandler(err => {
            btn.disabled = false;
            btn.innerHTML = originalText;
            if (typeof notify === 'function') notify(err, "error");
        })
        [id ? "updateUnit" : "createFracao"](id ? id : payload, id ? payload : _ctxEmail(), id ? _ctxEmail() : undefined);
    }

    function deleteFracao(id, nome) {
        if (!confirm(`Tem a certeza que deseja eliminar a fração ${nome}?`)) return;
        google.script.run.withSuccessHandler(res => {
            if (res.success) {
                if (typeof notify === 'function') notify("Fração eliminada", "success");
                loadFracoes();
            } else {
                if (typeof notify === 'function') notify(res.error, "error");
            }
        }).deleteFracao(id, _ctxEmail());
    }

    function openIbanVault(idPredio) {
        document.getElementById('ibanVaultPredioId').value = idPredio;
        document.getElementById('ibanVaultNovoIban').value = '';
        document.getElementById('ibanVaultMotivo').value = '';
        document.getElementById('ibanVaultToken').value = '';
        document.getElementById('ibanVaultStep1').classList.remove('hidden');
        document.getElementById('ibanVaultStep2').classList.add('hidden');
        document.getElementById('modalIbanVault').classList.remove('hidden');
    }

    function closeIbanVault() {
        document.getElementById('modalIbanVault').classList.add('hidden');
        document.getElementById('ibanVaultStep1').classList.remove('hidden');
        document.getElementById('ibanVaultStep2').classList.add('hidden');
    }

    function solicitarCodigoIban() {
        const id = document.getElementById('ibanVaultPredioId').value;
        const novoIban = document.getElementById('ibanVaultNovoIban').value;
        const motivo = document.getElementById('ibanVaultMotivo').value;

        if (!id || !novoIban || !motivo) return typeof notify === 'function' && notify("Preencha todos os campos", "warning");

        if (typeof notify === 'function') notify("A solicitar código...", "info");
        google.script.run.withSuccessHandler(res => {
            if (res.success) {
                document.getElementById('ibanVaultStep1').classList.add('hidden');
                document.getElementById('ibanVaultStep2').classList.remove('hidden');
                if (typeof notify === 'function') notify(res.message, "success");
            } else {
                if (typeof notify === 'function') notify(res.error, "error");
            }
        }).solicitarTrocaIBAN(id, novoIban, motivo, _ctxEmail());
    }

    function validarCodigoIban() {
        const id = document.getElementById('ibanVaultPredioId').value;
        const token = document.getElementById('ibanVaultToken').value;

        if (!token) return typeof notify === 'function' && notify("Introduza o código", "warning");

        if (typeof notify === 'function') notify("A validar código...", "info");
        google.script.run.withSuccessHandler(res => {
            if (res.success) {
                if (typeof notify === 'function') notify(res.message, "success");
                closeIbanVault();
                loadPredios();
            } else {
                if (typeof notify === 'function') notify(res.error, "error");
            }
        }).confirmarTrocaIBAN(id, token, _ctxEmail());
    }

    // ========================================
    // LOGÍSTICA REVERSA (VASILHAME)
    // ========================================

    function loadSaldosVasilhame() {
        const tbody = document.getElementById('listaSaldosVasilhame');
        if (!tbody) return;
        tbody.innerHTML = '<tr><td colspan="4" class="text-center py-4">A carregar...</td></tr>';
        google.script.run.withSuccessHandler(function (saldos) {
            tbody.innerHTML = saldos.length === 0 ? '<tr><td colspan="4" class="text-center py-4 text-slate-400">Nenhum saldo pendente.</td></tr>' :
                saldos.map(s => `
                <tr class="border-b border-slate-100">
                    <td class="px-4 py-3 font-bold">${s.cliente}</td>
                    <td class="px-4 py-3">${s.artigo}</td>
                    <td class="px-4 py-3 font-black ${s.saldo > 0 ? 'text-red-500' : 'text-emerald-500'}">${s.saldo}</td>
                    <td class="px-4 py-3 text-right">
                        <button onclick="recolherVasilhame('${s.cliente}', '${s.artigo}')" class="text-xs font-bold bg-[#06B6D4] text-white px-3 py-1 rounded-lg">Recolher</button>
                    </td>
                </tr>`).join('');
        }).getSaldosVasilhame(_ctxEmail());
    }

    function saveVasilhameManual(event) {
        if (event) event.preventDefault();
        const payload = {
            cliente: document.getElementById('vasilhame_cliente').value,
            artigo: document.getElementById('vasilhame_artigo').value,
            tipoMovimento: document.getElementById('vasilhame_tipo').value,
            quantidade: document.getElementById('vasilhame_quantidade').value,
            observacoes: document.getElementById('vasilhame_observacoes').value
        };
        google.script.run.withSuccessHandler(function (res) {
            if (res.success) {
                notify('Movimento registado!', 'success');
                document.getElementById('formVasilhame').reset();
                loadSaldosVasilhame();
            } else {
                notify(res.error, 'error');
            }
        }).saveVasilhame(payload, _ctxEmail());
        return false;
    }

    // ========================================
    // REVELAR DADO SENSÍVEL (RGPD)
    // ========================================

    let _revealCtx = {};

    function requestRevealSensitive(entityId, entityType, field) {
        _revealCtx = { entityId, entityType, field };
        document.getElementById('modalRevealSensitive').classList.remove('hidden');
    }

    function confirmRevealData() {
        const code = document.getElementById('revealSensitiveCode')?.value;
        google.script.run.withSuccessHandler(function (res) {
            if (res.success) {
                document.getElementById('modalRevealSensitive').classList.add('hidden');
                document.getElementById('revealedDataValue').textContent = res.value;
                document.getElementById('revealedDataContainer').classList.remove('hidden');
                document.getElementById('btnConfirmReveal').classList.add('hidden');
            } else {
                notify('Código incorreto ou expirado.', 'error');
            }
        }).revelarDadoSensivel(_revealCtx.entityId, _revealCtx.entityType, _revealCtx.field, code, _ctxEmail());
    }

    function closeRevealModal() {
        document.getElementById('modalRevealSensitive').classList.add('hidden');
        document.getElementById('revealedDataContainer').classList.add('hidden');
        document.getElementById('btnConfirmReveal').classList.remove('hidden');
    }

</script>
