    <!-- Correção de Domínio: Forçar redirecionamento apenas para domínio oficial flowly.pt -->
    <script>
        (function() {
            var hostname = window.location.hostname;
            var pathname = window.location.pathname;
            var search = window.location.search;
            
            // Executar redirecionamentos APENAS se estivermos no domínio flowly.pt
            // Ignorar completamente se estivermos em github.io ou localhost
            if (hostname.includes('flowly.pt') && !hostname.includes('github.io') && !hostname.includes('localhost')) {
                // Redirecionar www.flowly.pt para flowly.pt (ou vice-versa) para manter consistência
                if (hostname.startsWith('www.')) {
                    var newHost = hostname.replace('www.', '');
                    if (hostname !== newHost) {
                        window.location.replace('https://' + newHost + pathname + search);
                    }
                }
                // Também garantir HTTPS
                if (window.location.protocol === 'http:') {
                    window.location.replace('https://' + hostname + pathname + search);
                }
            }
        })();
    </script>

    <!-- Proteção contra falhas no carregamento de Fichas Técnicas -->
    <script>
        // Garantir que Tailwind, Lucide e Mock estão carregados antes da lógica de permissões
        window.waitForLibraries = function(callback) {
            var checkLibraries = function() {
                var tailwindReady = typeof window.tailwind !== 'undefined' || document.querySelector('script[src*="tailwind"]');
                var lucideReady = typeof window.lucide !== 'undefined' || document.querySelector('script[src*="lucide"]');
                var mockReady = typeof window.google !== 'undefined' && window.google.script && window.google.script.run;
                
                if (tailwindReady && lucideReady && mockReady) {
                    // Inicializar Lucide se disponível
                    if (typeof window.lucide !== 'undefined') {
                        try {
                            window.lucide.createIcons();
                        } catch (e) {
                            console.warn('Lucide initialization failed:', e);
                        }
                    }
                    callback();
                } else {
                    setTimeout(checkLibraries, 50);
                }
            };
            checkLibraries();
        };
        
        window.reportModuleError = window.reportModuleError || function(moduleName, error) {
            // Usar o novo sistema de diagnóstico FlowlyDebug se disponível
            if (window.FlowlyDebug && typeof window.FlowlyDebug.logError === 'function') {
                window.FlowlyDebug.logError(moduleName, error);
            } else {
                // Fallback para o sistema antigo
                var msg = "Erro técnico no módulo [" + moduleName + "]: " + (error ? (error.message || error) : "Desconhecido");
                console.error(msg, error);
                if (typeof notify === 'function') notify(msg, "error"); else alert(msg);
            }
        };
    </script>
